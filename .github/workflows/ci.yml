name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: img
          POSTGRES_PASSWORD: img
          POSTGRES_DB: img_crm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U img"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://img:img@localhost:5432/img_crm_test?schema=public
      NEXTAUTH_SECRET: ci-secret-only-for-github-actions
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma generate
      - run: pnpm prisma migrate deploy || pnpm prisma db push
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      # E2E (nakon build-a)
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - name: Seed DB for E2E
        run: pnpm seed
      - name: Run E2E
        run: pnpm test:e2e
        env:
          CI: "true"
